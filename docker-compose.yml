version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loan-origination-api
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-loandb}
      - DB_USERNAME=${DB_USERNAME:-loanuser}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-min-256-bits-required}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - HIKARI_MAX_POOL_SIZE=${HIKARI_MAX_POOL_SIZE:-20}
      - HIKARI_MIN_IDLE=${HIKARI_MIN_IDLE:-5}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: loan-origination-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-loandb}
      - POSTGRES_USER=${DB_USERNAME:-loanuser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-loanuser} -d ${POSTGRES_DB:-loandb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
