# Production Profile - PostgreSQL Database
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/loandb}
    username: ${DB_USERNAME:loanuser}
    password: ${DB_PASSWORD:loanpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.openclaw.loanorigination: INFO
