# Server Configuration
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Application Info
spring.application.name=loan-origination-credit-api

# Actuator Configuration
management.endpoint.health.show-details=when_authorized
management.endpoints.web.exposure.include=health,info,metrics

# JWT Configuration
jwt.secret=${JWT_SECRET:change-me-in-production-min-256-bits-required}
jwt.expiration=86400000

# CORS Configuration
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}

# H2 Console (disabled by default)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# Rate Limiting
rate.limit.auth.requests=20
rate.limit.auth.period=60
