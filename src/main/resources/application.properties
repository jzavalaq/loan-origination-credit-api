# Server Configuration
server.port=8080
server.shutdown=graceful
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,application/javascript,text/css
server.compression.min-response-size=1024
spring.lifecycle.timeout-per-shutdown-phase=30s

# Application Info
spring.application.name=loan-origination-credit-api

# Active Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Actuator Configuration
management.endpoint.health.show-details=when_authorized
management.endpoints.web.exposure.include=health,info,metrics

# JWT Configuration
jwt.secret=${JWT_SECRET:change-me-in-production-min-256-bits-required-for-hs256-algorithm-security}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# CORS Configuration
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}

# H2 Console (disabled by default)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# Rate Limiting
rate.limit.auth.requests=${RATE_LIMIT_AUTH_REQUESTS:20}
rate.limit.auth.period=${RATE_LIMIT_AUTH_PERIOD:60}

# HikariCP Connection Pool (defaults, overridden by profile-specific configs)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
