# Test profile configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console - always disabled in test
spring.h2.console.enabled=false

# Flyway disabled for tests (using Hibernate ddl-auto)
spring.flyway.enabled=false

# Disable security for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# JWT test configuration
jwt.secret=test-secret-key-for-testing-only-32chars
jwt.expiration=3600000

# CORS test configuration
allowed.origins=http://localhost:3000

# Logging
logging.level.com.openclaw.loanorigination=DEBUG
